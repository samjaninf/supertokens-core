name: Release – Mark tests as passed

on:
  workflow_call:
    inputs:
      core-version:
        type: string
        required: true
      postgresql-plugin-version:
        type: string
        required: true
      release-postgresql-plugin:
        type: boolean
        required: true
      is-canary:
        type: boolean
        required: true

jobs:
  mark-as-passed:
    name: Mark as passed (${{ matrix.plugin }})
    environment: publish
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - sqlite
          - postgresql
    steps:
      - name: Mark plugin as passed
        if: matrix.plugin != 'sqlite' && inputs.release-postgresql-plugin
        env:
          SUPERTOKENS_API_KEY: ${{ secrets.SUPERTOKENS_API_KEY }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X PATCH \
            -H "Content-Type: application/json" \
            -H "api-version: 0" \
            -d "{\"password\":\"$SUPERTOKENS_API_KEY\",\"version\":\"${{ inputs.postgresql-plugin-version }}\",\"planType\":\"FREE\",\"name\":\"${{ matrix.plugin }}\",\"testPassed\":true,\"isCanary\":${{ inputs.is-canary }}}" \
            https://api.supertokens.io/0/plugin)
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "$body"
          if [ "$status" != "200" ]; then
            echo "API request failed with status $status"
            exit 1
          fi

      - name: Mark core as passed
        if: matrix.plugin == 'sqlite'
        env:
          SUPERTOKENS_API_KEY: ${{ secrets.SUPERTOKENS_API_KEY }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X PATCH \
            -H "Content-Type: application/json" \
            -H "api-version: 0" \
            -d "{\"password\":\"$SUPERTOKENS_API_KEY\",\"version\":\"${{ inputs.core-version }}\",\"planType\":\"FREE\",\"testPassed\":true,\"isCanary\":${{ inputs.is-canary }}}" \
            https://api.supertokens.io/0/core)
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "$body"
          if [ "$status" != "200" ]; then
            echo "API request failed with status $status"
            exit 1
          fi
